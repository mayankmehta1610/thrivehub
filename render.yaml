# ThriveHub — Render Blueprint (R3/R4)
# https://render.com/docs/blueprint-spec
#
# Deploy: Dashboard → New → Blueprint → connect mayankmehta1610/thrivehub (branch: main).
# PostgreSQL tables live in schema "thrivehub" (DATABASE_SCHEMA); created on API startup.
#
# Free-tier PostgreSQL: Render allows one free database per workspace. This blueprint does
# NOT provision thrivehub-db. Reuse your existing DB (e.g. sumayacare360-db) and set
# DATABASE_URL in the dashboard: thrivehub-api → Environment → Link Database, or paste
# the Internal Database URL. ThriveHub uses schema "thrivehub" so it can share the same
# Postgres instance as other apps without table collisions.
#
# R3/R4 optional integrations — set in Render dashboard (sync: false placeholders below):
#   REDIS_URL          — external Redis (e.g. Upstash); falls back to in-memory cache
#   S3_*               — S3-compatible media storage; falls back to local uploads/
#   FCM_*              — Firebase push notifications
#   VITE_API_URL       — direct API URL for WebSocket messaging (see README)
#
# NEVER commit API keys or database passwords to git.

services:
  # FastAPI backend
  - type: web
    name: thrivehub-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SCHEMA
        value: thrivehub
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://thrivehub-web.onrender.com,https://www.thrivehub-web.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Optional — set in Render dashboard (sync: false)
      - key: REDIS_URL
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        value: thrivehub-media
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_REGION
        value: us-east-1
      - key: FCM_SERVER_KEY
        sync: false
      - key: FCM_PROJECT_ID
        sync: false
      # Public URLs (used for social OAuth redirects)
      - key: WEB_URL
        value: https://thrivehub-web.onrender.com
      - key: PUBLIC_API_URL
        value: https://thrivehub-api.onrender.com
      # Social publishing OAuth — set these to enable LIVE connect + cross-posting.
      # Register a developer app on each platform; redirect URI is
      #   {PUBLIC_API_URL}/api/v1/integrations/{provider}/callback
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: INSTAGRAM_CLIENT_ID
        sync: false
      - key: INSTAGRAM_CLIENT_SECRET
        sync: false
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false

  # React (Vite) frontend — static site with API proxy
  - type: web
    name: thrivehub-web
    runtime: static
    plan: free
    region: oregon
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-store, no-cache, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      # web/public/_redirects mirrors blueprint routes when services are created via API (proxy type unsupported on POST /routes).
      - key: VITE_API_URL
        value: https://thrivehub-api.onrender.com/api/v1
    routes:
      - type: proxy
        source: /health
        destination: https://thrivehub-api.onrender.com/health
      - type: proxy
        source: /api/*
        destination: https://thrivehub-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Keep API warm (Render cron jobs require a paid plan — see backend/scripts/keepalive.md)
  - type: cron
    name: thrivehub-keepalive
    runtime: python
    region: oregon
    rootDir: backend
    schedule: "*/10 * * * *"
    buildCommand: "true"
    startCommand: 'python -c "import urllib.request; urllib.request.urlopen(''https://thrivehub-api.onrender.com/health'').read()"'
